services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - hf-cache:/root/.cache/huggingface
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ui:
    build: .
    command: ["streamlit", "run", "streamlit_app.py", "--server.address", "0.0.0.0"]
    ports:
      - "8501:8501"
    depends_on:
      - api
    environment:
      API_URL: http://api:8000

volumes:
  hf-cache:
